name: Wiki Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wiki Agent
        run: npm install --global wiki-agent

      - name: Run Wiki Agent
        run: wiki --update --print
        env:
          WIKI_OLLAMA_MODE: cloud
          WIKI_OLLAMA_API_KEY: ${{ secrets.WIKI_OLLAMA_API_KEY }}
          WIKI_MODEL: ${{ vars.WIKI_MODEL || 'qwen3-coder' }}

      - name: Create Wiki update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: .wiki
          branch: wiki/update
          commit-message: "docs: update wiki"
          title: "docs: update wiki"
          body: |
            Automated wiki documentation update.

            This PR was generated by the scheduled Wiki Update workflow.