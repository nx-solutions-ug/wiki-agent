name: omp

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  agent:
    if: >-
      !endsWith(github.event.comment.user.login, '[bot]') &&
      (
        contains(github.event.comment.body, ' /omp') ||
        startsWith(github.event.comment.body, '/omp')
      )
    concurrency:
      group: omp-agent-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Authenticate gh CLI
        run: echo "${{ steps.app-token.outputs.token }}" | gh auth login --with-token
      - name: Configure git for push
        run: gh auth setup-git

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          no-cache: 'true'
      - name: Install OMP
        shell: bash
        run: |
          curl -fsSL https://omp.sh/install | sh -s -- --source
          echo "$HOME/.omp/bin" >> "$GITHUB_PATH"

      - name: Authenticate OMP
        shell: bash
        run: |
          omp config path > /dev/null 2>&1
          sqlite3 ~/.omp/agent/agent.db "INSERT INTO auth_credentials (provider, credential_type, data) VALUES ('ollama-cloud', 'api_key', '{\"key\":\"${{ secrets.OLLAMA_API_KEY }}\"}');"

      - name: Populate OMP models
        shell: bash
        run: omp models refresh ollama-cloud > /dev/null 2>&1

      - name: Extract prompt from comment
        id: extract-prompt
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        shell: bash
        run: |
          PROMPT=$(echo "$COMMENT_BODY" | sed -E 's/^\/(omp|oc)[[:space:]]*//')

          CMD_NAME=$(echo "$PROMPT" | sed -E 's/^\/([a-z0-9-]+).*/\1/')
          CMD_FILE=".omp/commands/${CMD_NAME}.md"

          if [[ -f "$CMD_FILE" ]]; then
            CMD_ARGS=$(echo "$PROMPT" | sed -E 's/^\/[a-z0-9-]+[[:space:]]*//')
            EXPANDED=$(sed "s/\\\$ARGUMENTS/${CMD_ARGS}/g" "$CMD_FILE")
            echo "$EXPANDED" > /tmp/omp-prompt.txt
          else
            echo "$PROMPT" > /tmp/omp-prompt.txt
          fi

          echo "has_prompt=true" >> "$GITHUB_OUTPUT"

      - name: Run OMP
        if: steps.extract-prompt.outputs.has_prompt == 'true'
        env:
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: omp -p --model ollama-cloud/minimax-m3 --mode json "$(cat /tmp/omp-prompt.txt)" | python3 .omp/stream-log.py
