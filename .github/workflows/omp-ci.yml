name: omp-ci

on:
  issues:
    types: [ opened ]
  pull_request:
    types: [ opened, synchronize, ready_for_review ]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review (triggers review-pr job)"
        required: false
      issue_number:
        description: "Issue number to triage (triggers triage-issue job)"
        required: false

jobs:
  triage-issue:
    if: github.event_name == 'issues' || (github.event_name == 'workflow_dispatch' && github.event.inputs.issue_number != '')
    timeout-minutes: 30
    concurrency:
      group: omp-triage-${{ github.event.issue.number || github.event.inputs.issue_number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Authenticate gh CLI
        run: echo "${{ steps.app-token.outputs.token }}" | gh auth login --with-token
      - name: React to issue
        run: gh api --method POST "/repos/${{ github.repository }}/issues/${{ github.event.issue.number || github.event.inputs.issue_number }}/reactions" -f content='eyes'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          no-cache: 'true'

      - name: Install OMP
        shell: bash
        run: |
          curl -fsSL https://omp.sh/install | sh -s -- --source
          echo "$HOME/.omp/bin" >> "$GITHUB_PATH"

      - name: Authenticate OMP
        shell: bash
        run: |
          omp config path > /dev/null 2>&1
          sqlite3 ~/.omp/agent/agent.db "INSERT INTO auth_credentials (provider, credential_type, data) VALUES ('ollama-cloud', 'api_key', '{\"key\":\"${{ secrets.OLLAMA_API_KEY }}\"}');"

      - name: Populate OMP models
        shell: bash
        run: omp models refresh ollama-cloud > /dev/null 2>&1

      - name: Triage issue
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
        run: |
          EXPANDED=$(sed 's/\$ARGUMENTS/${{ github.event.issue.number || github.event.inputs.issue_number }}/g' .omp/commands/triage-issue.md)
          omp --model ollama-cloud/minimax-m3 -p --mode json "$EXPANDED" | python3 .omp/stream-log.py
      - name: Dispatch fix-issue workflow
        if: always()
        shell: bash
        run: |
          gh api repos/${{ github.repository }}/dispatches \
            -f event_type='issue-triaged' \
            -f client_payload[issue_number]="${{ github.event.issue.number || github.event.inputs.issue_number }}"

  label-pr:
    if: >-
      github.event_name == 'pull_request' &&
      (github.event.action == 'opened' || github.event.action == 'synchronize' || github.event.action == 'ready_for_review')
    timeout-minutes: 30
    concurrency:
      group: omp-label-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Authenticate gh CLI
        run: echo "${{ steps.app-token.outputs.token }}" | gh auth login --with-token

      - name: Check if labels already applied
        id: label-skip
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          TYPE_LABELS="bug feature enhancement docs chore"
          PRIORITY_LABELS="priority: critical priority: high priority: medium priority: low"
          LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name')
          has_type=false
          has_priority=false
          for label in $TYPE_LABELS; do
            if echo "$LABELS" | grep -qx "$label"; then has_type=true; break; fi
          done
          for label in $PRIORITY_LABELS; do
            if echo "$LABELS" | grep -qx "$label"; then has_priority=true; break; fi
          done
          if [[ "$has_type" == "true" && "$has_priority" == "true" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: PR #$PR_NUMBER already has type and priority labels"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          no-cache: 'true'

      - name: Install OMP
        if: steps.label-skip.outputs.skip != 'true'
        shell: bash
        run: |
          curl -fsSL https://omp.sh/install | sh -s -- --source
          echo "$HOME/.omp/bin" >> "$GITHUB_PATH"

      - name: Authenticate OMP
        if: steps.label-skip.outputs.skip != 'true'
        shell: bash
        run: |
          omp config path > /dev/null 2>&1
          sqlite3 ~/.omp/agent/agent.db "INSERT INTO auth_credentials (provider, credential_type, data) VALUES ('ollama-cloud', 'api_key', '{\"key\":\"${{ secrets.OLLAMA_API_KEY }}\"}');"

      - name: Populate OMP models
        if: steps.label-skip.outputs.skip != 'true'
        shell: bash
        run: omp models refresh ollama-cloud > /dev/null 2>&1

      - name: Label PR
        if: steps.label-skip.outputs.skip != 'true'
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
        run: |
          EXPANDED=$(sed 's/\$ARGUMENTS/${{ github.event.pull_request.number }}/g' .omp/commands/label-pr.md)
          omp -p --model ollama-cloud/minimax-m3 --mode json "$EXPANDED" | python3 .omp/stream-log.py

  review-pr:
    if: >-
      (github.event_name == 'pull_request' && github.event.action != 'closed') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.pr_number != '')
    timeout-minutes: 30
    concurrency:
      group: omp-review-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Check if re-review is needed (synchronize only)
        id: re-review-check
        if: github.event.action == 'synchronize'
        uses: actions/github-script@v9
        with:
          result-encoding: string
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });
            const headSha = pr.head.sha;
            const { data: commit } = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha
            });
            const author = commit.commit.author.name || '';
            const committer = commit.commit.committer.name || '';
            const isAgentCommit = author.includes('opencode-agent') || committer.includes('opencode-agent')
              || author.includes('opencode') || committer.includes('opencode')
              || author.includes('github-actions') || committer.includes('github-actions')
              || author.includes('omp-agent') || committer.includes('omp-agent')
              || author.includes('chronova-agent') || committer.includes('chronova-agent');
            return isAgentCommit ? 'false' : 'true';

      - name: Determine review type
        id: review-type
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login || '' }}
        run: |
          if [[ "$PR_AUTHOR" == *"renovate"* ]] || [[ "$PR_AUTHOR" == *"dependabot"* ]]; then
            echo "prefix=dep:" >> "$GITHUB_OUTPUT"
          elif [[ "$PR_AUTHOR" == *"[bot]"* ]] || [[ "$PR_AUTHOR" == *"opencode-agent"* ]]; then
            echo "prefix=bot:" >> "$GITHUB_OUTPUT"
          else
            echo "prefix=" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if should skip
        id: should-skip
        env:
          ACTION: ${{ github.event.action || 'opened' }}
          RE_REVIEW: ${{ steps.re-review-check.outputs.result || 'true' }}
        run: |
          skip="false"
          if [[ "$ACTION" == "synchronize" ]] && [[ "$RE_REVIEW" == "false" ]]; then
            skip="true"
          fi
          echo "skip=${skip}" >> "$GITHUB_OUTPUT"

      - name: Generate app token
        if: steps.should-skip.outputs.skip != 'true'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Authenticate gh CLI
        if: steps.should-skip.outputs.skip != 'true'
        run: echo "${{ steps.app-token.outputs.token }}" | gh auth login --with-token

      - name: React to PR
        if: steps.should-skip.outputs.skip != 'true'
        run: gh api --method POST "/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number || github.event.inputs.pr_number }}/reactions" -f content='eyes'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          no-cache: 'true'

      - name: Install OMP
        if: steps.should-skip.outputs.skip != 'true'
        shell: bash
        run: |
          curl -fsSL https://omp.sh/install | sh -s -- --source
          echo "$HOME/.omp/bin" >> "$GITHUB_PATH"

      - name: Authenticate OMP
        if: steps.should-skip.outputs.skip != 'true'
        shell: bash
        run: |
          omp config path > /dev/null 2>&1
          sqlite3 ~/.omp/agent/agent.db "INSERT INTO auth_credentials (provider, credential_type, data) VALUES ('ollama-cloud', 'api_key', '{\"key\":\"${{ secrets.OLLAMA_API_KEY }}\"}');"

      - name: Populate OMP models
        if: steps.should-skip.outputs.skip != 'true'
        shell: bash
        run: omp models refresh ollama-cloud > /dev/null 2>&1

      - name: Review PR
        if: steps.should-skip.outputs.skip != 'true'
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
        run: |
          EXPANDED=$(sed 's/\$ARGUMENTS/${{ github.event.pull_request.number || github.event.inputs.pr_number }}/g' .omp/commands/review-pr.md)
          omp -p --model ollama-cloud/minimax-m3 --mode json "$EXPANDED" | python3 .omp/stream-log.py
